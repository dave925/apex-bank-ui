<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - APEX Bank</title>
    <link rel="stylesheet" href="css/apex-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="apex-nav">
        <div class="apex-nav-container">
            <a href="index.html" class="apex-brand">
                <div class="apex-brand-icon">
                    <i class="fas fa-university"></i>
                </div>
                <span>APEX</span>
            </a>
            
            <!-- Desktop Navigation Menu -->
            <div class="apex-nav-menu">
                <a href="home.html" class="apex-nav-link">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="account.html" class="apex-nav-link">
                    <i class="fas fa-credit-card"></i>
                    <span>Account</span>
                </a>
                <a href="goals.html" class="apex-nav-link">
                    <i class="fas fa-piggy-bank"></i>
                    <span>Goals</span>
                </a>
                <a href="move.html" class="apex-nav-link">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Move</span>
                </a>
                <a href="analytics.html" class="apex-nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
                <a href="credit.html" class="apex-nav-link">
                    <i class="fas fa-credit-card"></i>
                    <span>Credit</span>
                </a>
                <div class="apex-nav-dropdown">
                    <button class="apex-nav-link apex-nav-dropdown-toggle">
                        <i class="fas fa-ellipsis-h"></i>
                        <span>More</span>
                        <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 4px;"></i>
                    </button>
                    <div class="apex-nav-dropdown-menu">
                        <a href="settings.html" class="apex-nav-dropdown-item">
                            <i class="fas fa-cog"></i>
                            Settings
                        </a>
                        <a href="help.html" class="apex-nav-dropdown-item">
                            <i class="fas fa-question-circle"></i>
                            Help
                        </a>
                        <a href="notifications.html" class="apex-nav-dropdown-item">
                            <i class="fas fa-bell"></i>
                            Notifications
                        </a>
                        <a href="profile.html" class="apex-nav-dropdown-item">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Mobile Menu Toggle -->
            <button class="apex-nav-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="apex-container apex-section">
            <div style="text-align: center; margin-bottom: var(--apex-spacing-10);">
                <h1 style="font-size: var(--apex-font-size-3xl); font-weight: 700; color: var(--apex-dark-blue); margin-bottom: var(--apex-spacing-4);">
                    Notifications
                </h1>
                <p style="font-size: var(--apex-font-size-lg); color: var(--apex-medium-gray);">
                    Stay updated on your account activity
                </p>
            </div>

            <div class="apex-card">
                <div style="text-align: center; padding: var(--apex-spacing-8) var(--apex-spacing-4); color: var(--apex-medium-gray);">
                    <div style="font-size: 3rem; margin-bottom: var(--apex-spacing-4); opacity: 0.3;">
                        <i class="fas fa-bell-slash"></i>
                    </div>
                    <h4 style="font-size: var(--apex-font-size-lg); font-weight: 600; color: var(--apex-dark-gray); margin-bottom: var(--apex-spacing-2);">No notifications</h4>
                    <p style="font-size: var(--apex-font-size-sm); margin: 0;">You're all caught up! Check back later for updates.</p>
                </div>
            </div>

            <div class="apex-card" style="margin-top: var(--apex-spacing-6);">
                <h3 style="font-size: var(--apex-font-size-xl); font-weight: 600; color: var(--apex-dark-blue); margin-bottom: var(--apex-spacing-4);">Notification Settings</h3>
                <div style="display: flex; flex-direction: column; gap: var(--apex-spacing-4);">
                    <label style="display: flex; align-items: center; justify-content: space-between; padding: var(--apex-spacing-3); background: var(--apex-off-white); border-radius: var(--apex-radius-lg);">
                        <span style="font-weight: 500;">Transaction Alerts</span>
                        <input type="checkbox" checked style="width: auto;">
                    </label>
                    <label style="display: flex; align-items: center; justify-content: space-between; padding: var(--apex-spacing-3); background: var(--apex-off-white); border-radius: var(--apex-radius-lg);">
                        <span style="font-weight: 500;">Low Balance Alerts</span>
                        <input type="checkbox" checked style="width: auto;">
                    </label>
                    <label style="display: flex; align-items: center; justify-content: space-between; padding: var(--apex-spacing-3); background: var(--apex-off-white); border-radius: var(--apex-radius-lg);">
                        <span style="font-weight: 500;">Goal Updates</span>
                        <input type="checkbox" checked style="width: auto;">
                    </label>
                    <label style="display: flex; align-items: center; justify-content: space-between; padding: var(--apex-spacing-3); background: var(--apex-off-white); border-radius: var(--apex-radius-lg);">
                        <span style="font-weight: 500;">Security Alerts</span>
                        <input type="checkbox" checked style="width: auto;">
                    </label>
                    <label style="display: flex; align-items: center; justify-content: space-between; padding: var(--apex-spacing-3); background: var(--apex-off-white); border-radius: var(--apex-radius-lg);">
                        <span style="font-weight: 500;">Marketing Emails</span>
                        <input type="checkbox" style="width: auto;">
                    </label>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Navigation Bar -->
    <div class="apex-mobile-bar">
        <a href="home.html" class="apex-mobile-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="account.html" class="apex-mobile-item">
            <i class="fas fa-credit-card"></i>
            <span>Account</span>
        </a>
        <a href="goals.html" class="apex-mobile-item">
            <i class="fas fa-piggy-bank"></i>
            <span>Goals</span>
        </a>
        <a href="move.html" class="apex-mobile-item">
            <i class="fas fa-exchange-alt"></i>
            <span>Move</span>
        </a>
        <a href="analytics.html" class="apex-mobile-item">
            <i class="fas fa-chart-line"></i>
            <span>Analytics</span>
        </a>
        <a href="#" class="apex-mobile-item" onclick="showMoreMenu()">
            <i class="fas fa-ellipsis-h"></i>
            <span>More</span>
        </a>
    </div>

    <!-- Floating More button removed (top-nav dropdown is the single source of truth). -->
</body>
</html>
